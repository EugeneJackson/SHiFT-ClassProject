<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>//SHiFT - Inicio de sesión</title>
    <link rel="stylesheet" href="../CSS/formularios.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@600&display=swap" rel="stylesheet" />
</head>
<body>
    <header>
        <a href="../index.html"><img id="logo" src="../Images/LogoEdited.png" alt="Logo" /></a>

                <li><a href="">Catálogo</a></li>
                <li><a href="">Investigación</a></li>

    <main>

        <img src="../Images/Animation.gif" alt="" class="gifFondo">

        <form class="formulario">
            <h1 class="titulo-formulario">INICIO DE SESION DE RUNNER</h1>

            <label for="inicioSesionNombre">Correo Electrónico</label><br>
            <input class="controls" id="inicioSesionNombre" type="email"  name="email" placeholder="RUNNER_EMAIL"><br>

            <label for="inicioSesionContrasena">Contraseña</label><br>
            <input class="controls" id="inicioSesionContrasena" type="password" name="contrasena" placeholder="RUNNER_PASSWORD"><br>

            <input id="button" type="submit" name="" value="ACCEDER">

            <p><a href="registro.html">¿No tienes cuenta? Registrate</a></p>
        </form>

    </main>
